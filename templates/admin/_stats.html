{% load i18n %}
<div style="margin-bottom:20px">
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:24px">
        <div style="background:#1a365d;color:white;padding:20px;border-radius:12px">
            <div style="font-size:28px;font-weight:900">{{ total_orders }}</div>
            <div style="opacity:.8;font-size:13px">{% trans "总订单" %}</div>
        </div>
        <div style="background:#c53030;color:white;padding:20px;border-radius:12px">
            <div style="font-size:28px;font-weight:900">{{ pending_orders }}</div>
            <div style="opacity:.8;font-size:13px">{% trans "待支付" %}</div>
        </div>
        <div style="background:#2f855a;color:white;padding:20px;border-radius:12px">
            <div style="font-size:28px;font-weight:900">{{ paid_orders }}</div>
            <div style="opacity:.8;font-size:13px">{% trans "已支付" %}</div>
        </div>
        <div style="background:#2c5282;color:white;padding:20px;border-radius:12px">
            <div style="font-size:28px;font-weight:900">{{ total_products }}</div>
            <div style="opacity:.8;font-size:13px">{% trans "产品数" %}</div>
        </div>
        <div style="background:#b7791f;color:white;padding:20px;border-radius:12px">
            <div style="font-size:28px;font-weight:900">¥{{ revenue }}</div>
            <div style="opacity:.8;font-size:13px">{% trans "总收入" %}</div>
        </div>
    </div>
</div>
