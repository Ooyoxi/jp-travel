{% extends "base.html" %}
{% load i18n %}

{% block title %}{% trans "登录" %} - QuantBase{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex items-center justify-center px-4">
    <div class="w-full max-w-sm">
        <div class="bg-card rounded-xl p-6 border border-gray-200/80 shadow-sm">
            <h1 class="text-xl font-black text-gray-900 text-center mb-6">{% trans "登录" %}</h1>
            <form method="post" class="space-y-4">
                {% csrf_token %}
                <div>
                    <label class="text-xs font-medium text-gray-600 block mb-1">{% trans "用户名" %}</label>
                    <input type="text" name="username" required
                           class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-accent/30 focus:border-accent outline-none">
                </div>
                <div>
                    <label class="text-xs font-medium text-gray-600 block mb-1">{% trans "密码" %}</label>
                    <input type="password" name="password" required
                           class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-accent/30 focus:border-accent outline-none">
                </div>
                {% if form.errors %}
                <p class="text-xs text-red-500">{% trans "用户名或密码错误" %}</p>
                {% endif %}
                <button type="submit"
                        class="w-full py-2.5 bg-primary text-white rounded-lg text-sm font-semibold hover:bg-secondary transition-all">
                    {% trans "登录" %}
                </button>
            </form>
            <p class="text-xs text-gray-400 text-center mt-4">
                {% trans "还没有账号？" %}
                <a href="{% url 'accounts:register' %}" class="text-accent hover:underline">{% trans "注册" %}</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
